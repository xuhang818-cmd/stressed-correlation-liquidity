<!doctype html><html><head><meta charset="utf-8">

h1{font-size:20px;margin:0 0 4px} .sub{color:#667;margin:0 0 20px}
.ctl{background:#f4f6f9;border:1px solid #e2e8f0;border-radius:10px;padding:16px 18px;margin-bottom:18px}
input[type=range]{width:100%} .big{font-size:30px;font-weight:700;color:#1f3864}
.kept{font-family:ui-monospace,Menlo,monospace;background:#eef2f8;border-radius:6px;padding:8px 10px;display:inline-block;margin-top:6px}
.cl{border:1px solid #e2e8f0;border-radius:8px;padding:8px 12px;margin:8px 0}

</style></head><body>
<h1>Basket redundancy explorer</h1>
<p class="sub">Drag the threshold: any two assets whose correlation exceeds it are treated as
near-duplicates and merged; one representative per cluster is kept. The tree is fixed &mdash;
you are just choosing where to cut it.</p>
<div class="ctl">
  <label>merge if correlation &gt; <b id="tval"></b></label>
  <input type="range" id="sld" min="0.50" max="0.99" step="0.01">
  <div style="margin-top:10px"><span class="big" id="cnt"></span> <span class="tag">assets remain (of <span id="tot"></span>)</span></div>
  <div class="kept mono" id="kept"></div>
</div>
<div id="clusters"></div>
<script>
const D = {"Z": [[4, 5, 0.08921353539486188], [0, 1, 0.10388622421773586], [2, 3, 0.12303046760948899], [14, 15, 0.17765190739383113], [8, 13, 0.26850151654623067], [11, 16, 0.281457680525086], [7, 18, 0.3788421718820359], [6, 17, 0.4513238486950993], [9, 19, 0.616651101404898], [10, 20, 0.7938063709626124], [21, 22, 1.031824848147848], [12, 23, 1.229699189188005]], "labels": ["SPY", "IWM", "EFA", "EEM", "TLT", "IEF", "LQD", "HYG", "TIP", "DBC", "GLD", "VNQ", "UUP"], "names": ["US large-cap equity", "US small-cap equity", "Intl developed equity", "EM equity", "Long Treasuries", "Intermediate Treasuries", "IG credit", "HY credit", "TIPS (inflation-linked)", "Broad commodities", "Gold", "US REITs", "US dollar index"], "corr": [[1.0, 0.8961137757822641, 0.8861037554471413, 0.825933705431413, -0.30963323903828505, -0.2981494971141331, 0.2022022226348057, 0.6830408053382835, -0.1020021764242735, 0.4045787713333016, 0.059651220303741925, 0.7513757740993549, -0.18722644280733805], [0.8961137757822641, 1.0, 0.8152362020758469, 0.7621187074702743, -0.2905389130525508, -0.2798281808639923, 0.16889311988333894, 0.6248081512612911, -0.08900101017931507, 0.3778441942358129, 0.05853572469093837, 0.7673568452074984, -0.18010947496035412], [0.8861037554471413, 0.8152362020758469, 1.0, 0.876969532390511, -0.2892110531332435, -0.2648566668500824, 0.22791008152980827, 0.6619059567143039, -0.06545912657114893, 0.44602257960961833, 0.15912160783420384, 0.6924433573498571, -0.40181156413114516], [0.825933705431413, 0.7621187074702743, 0.876969532390511, 1.0, -0.27104105566441955, -0.26988556515444767, 0.17919283517649104, 0.6055815697597284, -0.090588206540515, 0.4441028001573508, 0.17731323164704405, 0.6629933012429456, -0.29127813459018725], [-0.30963323903828505, -0.2905389130525508, -0.2892110531332435, -0.27104105566441955, 1.0, 0.9107864646051381, 0.5453911166903573, -0.13179821185733398, 0.7018093914994029, -0.23320040243869927, 0.16868322993136733, -0.1588413877467824, -0.07153691827027796], [-0.2981494971141331, -0.2798281808639923, -0.2648566668500824, -0.26988556515444767, 0.9107864646051381, 1.0, 0.564590090656964, -0.09228347876526832, 0.7611875754081358, -0.20396160639220834, 0.22233705383681052, -0.15328570727807014, -0.15390555068919623], [0.2022022226348057, 0.16889311988333894, 0.22791008152980827, 0.17919283517649104, 0.5453911166903573, 0.564590090656964, 1.0, 0.4494989732880445, 0.5360472465673809, 0.07333184041495837, 0.16125326586526603, 0.18382674270980984, -0.1785675480174195], [0.6830408053382835, 0.6248081512612911, 0.6619059567143039, 0.6055815697597284, -0.13179821185733398, -0.09228347876526832, 0.4494989732880445, 1.0, 0.0866342140342454, 0.352136322670748, 0.04888637845324376, 0.5304526575162136, -0.20419820967242508], [-0.1020021764242735, -0.08900101017931507, -0.06545912657114893, -0.090588206540515, 0.7018093914994029, 0.7611875754081358, 0.5360472465673809, 0.0866342140342454, 1.0, 0.05313400565547417, 0.272500966516106, -0.047370246125125255, -0.20323030654542118], [0.4045787713333016, 0.3778441942358129, 0.44602257960961833, 0.4441028001573508, -0.23320040243869927, -0.20396160639220834, 0.07333184041495837, 0.352136322670748, 0.05313400565547417, 1.0, 0.3423285708503656, 0.27540872356378066, -0.2900746351279771], [0.059651220303741925, 0.05853572469093837, 0.15912160783420384, 0.17731323164704405, 0.16868322993136733, 0.22233705383681052, 0.16125326586526603, 0.04888637845324376, 0.272500966516106, 0.3423285708503656, 1.0, 0.056605276908697, -0.41498701352208317], [0.7513757740993549, 0.7673568452074984, 0.6924433573498571, 0.6629933012429456, -0.1588413877467824, -0.15328570727807014, 0.18382674270980984, 0.5304526575162136, -0.047370246125125255, 0.27540872356378066, 0.056605276908697, 1.0, -0.1794644719222362], [-0.18722644280733805, -0.18010947496035412, -0.40181156413114516, -0.29127813459018725, -0.07153691827027796, -0.15390555068919623, -0.1785675480174195, -0.20419820967242508, -0.20323030654542118, -0.2900746351279771, -0.41498701352208317, -0.1794644719222362, 1.0]], "thr": 0.85};
const Z=D.Z, LBL=D.labels, NM=D.names, C=D.corr, n=LBL.length;
const sld=document.getElementById("sld"); sld.value=D.thr;
function find(p,x){while(p[x]!==x){p[x]=p[p[x]];x=p[x];}return x;}
function clustersAt(h){
  let p=[...Array(n).keys()], rep={}; for(let i=0;i<n;i++)rep[i]=i;
  for(let k=0;k<Z.length;k++){let a=Z[k][0],b=Z[k][1],d=Z[k][2];
    if(d<=h){let fa=find(p,rep[a]),fb=find(p,rep[b]); if(fa!==fb)p[fa]=fb;}
    rep[n+k]=rep[a];}
  let g={}; for(let i=0;i<n;i++){let r=find(p,i);(g[r]=g[r]||[]).push(i);} return Object.values(g);
}
function central(ms){if(ms.length===1)return ms[0];let best=ms[0],bs=-2;
  for(const m of ms){let s=0;for(const o of ms)if(o!==m)s+=C[m][o];s/=(ms.length-1);if(s>bs){bs=s;best=m;}}return best;}
function render(){
  const t=parseFloat(sld.value), h=1-t;
  const cl=clustersAt(h).sort((a,b)=>b.length-a.length);
  const reps=cl.map(central);
  document.getElementById("tval").textContent=t.toFixed(2);
  document.getElementById("cnt").textContent=cl.length;
  document.getElementById("tot").textContent=n;
  document.getElementById("kept").textContent=reps.map(i=>LBL[i]).sort().join("  ");
  let html="";
  for(let c=0;c<cl.length;c++){const ms=cl[c],r=central(ms);
    if(ms.length===1){html+=`<div class="cl"><span class="rep">${LBL[ms[0]]}</span> <span class="tag">${NM[ms[0]]} &mdash; unique</span></div>`;}
    else{let parts=ms.map(i=>i===r?`<span class="rep">${LBL[i]}</span>`:`<span class="drop">${LBL[i]}</span>`).join(", ");
      html+=`<div class="cl">${parts} <span class="tag">&rarr; keep ${LBL[r]}</span></div>`;}}
  document.getElementById("clusters").innerHTML=html;
}
sld.addEventListener("input",render); render();
</script></body></html>
